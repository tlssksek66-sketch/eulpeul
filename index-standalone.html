<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOKZ KOREA · CLIPPING MAGAZINE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style id="inline-css">/* SHOKZ Korea Clipping Magazine — Stylesheet */

:root {
    --bg: #0d0f17;
    --bg-elev: #13151f;
    --bg-card: #161927;
    --bg-card-hi: #1c1f2e;
    --border: #232636;
    --text: #f4f5fb;
    --text-mid: #b8bcd0;
    --text-soft: #8389a0;
    --text-mute: #5a6079;
    --accent: #4a7cff;
    --accent-soft: #6b99ff;
    --green: #34d399;
    --orange: #fb923c;
    --purple: #a78bfa;
    --red: #f87171;
    --yellow: #fbbf24;
    --gray: #6b7280;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow-card: 0 1px 0 rgba(255,255,255,0.02), 0 6px 24px rgba(0,0,0,0.32);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

body {
    min-height: 100vh;
    background:
        radial-gradient(900px 500px at 12% -8%, rgba(74,124,255,0.10), transparent 60%),
        radial-gradient(900px 600px at 110% 0%, rgba(167,139,250,0.07), transparent 55%),
        var(--bg);
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input { font-family: inherit; outline: none; border: none; background: none; color: inherit; }
canvas { display: block; width: 100%; height: 100%; }

/* ---------- Topbar ---------- */
.topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(13, 15, 23, 0.78);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
}
.topbar-inner {
    max-width: 1320px;
    margin: 0 auto;
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-mark {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: 0.18em;
    color: var(--text);
}
.brand-divider {
    width: 1px;
    height: 16px;
    background: var(--border);
}
.brand-sub {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--text-soft);
    font-weight: 500;
}
.topbar-tools { display: flex; align-items: center; gap: 10px; }
.search-field {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    width: 320px;
    transition: border-color .15s, background .15s;
}
.search-field:focus-within {
    border-color: var(--accent);
    background: var(--bg-card-hi);
}
.search-field input {
    width: 100%;
    color: var(--text);
    font-size: 13px;
}
.search-field input::placeholder { color: var(--text-mute); }
.icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-mid);
    font-size: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: transform .2s, color .15s, background .15s;
}
.icon-btn:hover { background: var(--bg-card-hi); color: var(--accent); }
.icon-btn.spin { animation: spin .8s linear; }
@keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }

/* ---------- Page ---------- */
.page {
    max-width: 1320px;
    margin: 0 auto;
    padding: 28px 28px 56px;
}

/* ---------- Title block ---------- */
.title-block { margin-bottom: 18px; }
.title-block h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 6px;
}
.title-sub {
    font-size: 13px;
    color: var(--text-soft);
    font-weight: 400;
}

/* ---------- KPI strip ---------- */
.kpi-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr) minmax(180px, 220px);
    gap: 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 22px;
    box-shadow: var(--shadow-card);
}
.kpi-cell {
    padding: 18px 24px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.kpi-cell:last-child { border-right: none; }
.kpi-num {
    font-family: 'Inter', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.1;
    letter-spacing: -0.02em;
}
.kpi-label {
    font-size: 12px;
    color: var(--text-soft);
    font-weight: 400;
}
.kpi-time { background: rgba(74,124,255,0.04); }
.kpi-time-value {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
}

/* ---------- Tabs ---------- */
.tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
    overflow-x: auto;
    scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text-soft);
    font-weight: 500;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
}
.tab:hover { color: var(--text-mid); }
.tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 700;
}

/* ---------- Filter strip ---------- */
.filter-strip {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    margin-bottom: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    align-items: center;
    font-size: 13px;
    color: var(--text-soft);
}
.filter-strip .fs-key { color: var(--text-mute); margin-right: 4px; }
.filter-strip .fs-val { color: var(--text-mid); font-weight: 500; }
.filter-strip .fs-val.brand { color: var(--text); font-weight: 700; }
.filter-strip .fs-on {
    color: var(--green);
    font-weight: 700;
    padding: 2px 8px;
    background: rgba(52,211,153,0.10);
    border-radius: 4px;
    font-size: 11px;
    letter-spacing: 0.05em;
}
.filter-strip .fs-divider { color: var(--text-mute); }

/* ---------- Chart rows / cards ---------- */
.chart-row {
    display: grid;
    gap: 14px;
    margin-bottom: 14px;
}
.chart-row-wide { grid-template-columns: 1fr; }
.chart-row-3 { grid-template-columns: repeat(3, 1fr); }
.chart-row-2 { grid-template-columns: 1fr 1fr; }

.card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.card-head {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}
.card-head h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.005em;
}
.card-tag {
    font-size: 11px;
    color: var(--text-mute);
    font-weight: 500;
}
.card-body {
    padding: 14px 16px 18px;
    flex: 1;
    min-height: 0;
}
.card-body canvas {
    width: 100%;
    max-width: 100%;
}

/* ---------- Clipping list ---------- */
.clipping-list-wrap { margin-top: 18px; }
.clipping-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 14px;
}
.clipping-head h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
}
.clipping-head .count {
    font-family: 'Inter', sans-serif;
    color: var(--accent);
    font-size: 16px;
    font-weight: 700;
    margin-left: 6px;
}
.clipping-sub {
    font-size: 12px;
    color: var(--text-mute);
}
.clipping-list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
}
.clipping {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    transition: border-color .15s, transform .15s;
}
.clipping:hover {
    border-color: #2f3349;
    transform: translateY(-1px);
}
.clipping-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--text-mute);
    flex-wrap: wrap;
}
.clipping-meta .dot { color: #313547; }
.clipping-channel {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 2px 8px;
    border-radius: 999px;
    text-transform: uppercase;
}
.ch-news { background: rgba(74,124,255,0.14); color: var(--accent-soft); }
.ch-blog { background: rgba(52,211,153,0.14); color: var(--green); }
.ch-cafearticle { background: rgba(251,146,60,0.14); color: var(--orange); }

.clipping-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
}
.clipping-title a:hover { color: var(--accent-soft); }
.clipping-summary {
    font-size: 13px;
    color: var(--text-soft);
    line-height: 1.55;
}
.clipping-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    grid-column: 1 / -1;
    margin-top: 4px;
}
.tag {
    font-size: 11px;
    color: var(--text-soft);
    background: var(--bg-card-hi);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 999px;
}

.sentiment-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
    align-self: flex-start;
    height: fit-content;
    white-space: nowrap;
}
.sentiment-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
}
.s-positive { color: var(--green); background: rgba(52,211,153,0.10); }
.s-neutral  { color: var(--text-mid); background: rgba(107,114,128,0.16); }
.s-negative { color: var(--red); background: rgba(248,113,113,0.10); }

.empty-state {
    padding: 48px 16px;
    text-align: center;
    color: var(--text-mute);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
}

/* ---------- Footer ---------- */
.page-foot {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    color: var(--text-mute);
    font-size: 11px;
    letter-spacing: 0.06em;
}

/* ---------- Responsive ---------- */
@media (max-width: 1100px) {
    .chart-row-3 { grid-template-columns: 1fr 1fr; }
    .kpi-strip { grid-template-columns: repeat(2, 1fr); }
    .kpi-cell { border-right: none; border-bottom: 1px solid var(--border); }
    .kpi-cell:nth-child(2n) { border-right: 1px solid var(--border); }
    .kpi-time { grid-column: 1 / -1; }
}
@media (max-width: 760px) {
    .topbar-inner { flex-direction: column; align-items: stretch; gap: 12px; padding: 12px 16px; }
    .search-field { width: 100%; }
    .page { padding: 18px 16px 40px; }
    .chart-row-3, .chart-row-2 { grid-template-columns: 1fr; }
    .kpi-strip { grid-template-columns: 1fr 1fr; }
    .title-block h1 { font-size: 22px; }
}


</style>
</head>
<body>

            <div class="topbar-tools">
                <div class="search-field">
                    <input id="searchInput" type="text" placeholder="제목·요약·태그 검색…" autocomplete="off">

        <footer class="page-foot"><span>SHOKZ KOREA · CLIPPING MAGAZINE</span><span>powered by Magazine Engine</span></footer>

    <script id="chart-engine">/**
 * ChartEngine - Canvas 기반 경량 차트 라이브러리 (매거진 전용)
 * 외부 의존성 없이 순수 Canvas API로 렌더링.
 */
const ChartEngine = {
    colors: {
        blue: '#4a7cff',
        green: '#34d399',
        purple: '#a78bfa',
        orange: '#fb923c',
        red: '#f87171',
        yellow: '#fbbf24',
        cyan: '#22d3ee',
        gray: '#6b7280',
        grid: '#252836',
        text: '#9aa0b4',
        textLight: '#5a5f73',
        bg: '#13151f'
    },

    /**
     * 캔버스 초기화 + DPI 보정
     */
    initCanvas(canvasId) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return null;
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) return null;

        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.clearRect(0, 0, rect.width, rect.height);

        return { canvas, ctx, width: rect.width, height: rect.height };
    },

    /**
     * 일별 클리핑 추이 (막대 차트, 값 라벨 표시)
     */
    dailyBarChart(canvasId, { labels, counts, color = '#4a7cff' }) {
        const c = this.initCanvas(canvasId);
        if (!c) return;
        const { ctx, width, height } = c;
        const padding = { top: 30, right: 16, bottom: 32, left: 16 };
        const chartW = width - padding.left - padding.right;
        const chartH = height - padding.top - padding.bottom;

        const maxVal = Math.max(1, ...counts) * 1.2;
        const slot = chartW / counts.length;
        const barW = Math.min(slot * 0.55, 36);

        counts.forEach((v, i) => {
            const x = padding.left + i * slot + (slot - barW) / 2;
            const h = (v / maxVal) * chartH;
            const y = padding.top + chartH - h;

            // 막대
            if (v > 0) {
                const grad = ctx.createLinearGradient(0, y, 0, padding.top + chartH);
                grad.addColorStop(0, color);
                grad.addColorStop(1, color + '55');
                ctx.fillStyle = grad;
                this._roundRectTop(ctx, x, y, barW, h, 4);
                ctx.fill();

                // 값 라벨
                ctx.fillStyle = color;
                ctx.font = 'bold 11px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(String(v), x + barW / 2, y - 6);
            }

            // 날짜 라벨
            ctx.fillStyle = this.colors.textLight;
            ctx.font = '10px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(labels[i], x + barW / 2, height - 12);
        });
    },

    /**
     * 도넛 차트 (중앙 합계 + 우측 범례)
     */
    donutWithCenter(canvasId, { items, centerLabel = '건', centerSize = 'lg' }) {
        const c = this.initCanvas(canvasId);
        if (!c) return;
        const { ctx, width, height } = c;
        const total = items.reduce((s, x) => s + x.value, 0);
        if (total === 0) return;

        const cx = Math.min(width * 0.32, height * 0.6);
        const cy = height / 2;
        const r = Math.min(cx, cy) - 16;
        const inner = r * 0.62;

        let start = -Math.PI / 2;
        items.forEach(it => {
            const ang = (it.value / total) * Math.PI * 2;
            ctx.beginPath();
            ctx.arc(cx, cy, r, start, start + ang);
            ctx.arc(cx, cy, inner, start + ang, start, true);
            ctx.closePath();
            ctx.fillStyle = it.color;
            ctx.fill();
            start += ang;
        });

        // 중앙 합계
        ctx.fillStyle = '#f4f5fb';
        ctx.font = `bold ${centerSize === 'lg' ? '26' : '20'}px Inter, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(total), cx, cy - 6);
        ctx.font = '11px Noto Sans KR, sans-serif';
        ctx.fillStyle = this.colors.text;
        ctx.fillText(centerLabel, cx, cy + 14);

        // 우측 범례
        const legendX = cx + r + 24;
        const lineH = 22;
        const legendY = cy - (items.length * lineH) / 2 + lineH / 2;
        items.forEach((it, i) => {
            const y = legendY + i * lineH;
            ctx.fillStyle = it.color;
            this._roundRect(ctx, legendX, y - 6, 10, 10, 2);
            ctx.fill();
            ctx.fillStyle = this.colors.text;
            ctx.font = '12px Noto Sans KR, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(it.label, legendX + 18, y);
            ctx.fillStyle = '#f4f5fb';
            ctx.font = 'bold 12px Inter, sans-serif';
            ctx.textAlign = 'right';
            ctx.fillText(String(it.value), width - 16, y);
        });
    },

    /**
     * 가로 스택 감성바 (긍정/중립/부정)
     */
    stackedSentimentBar(canvasId, { items }) {
        const c = this.initCanvas(canvasId);
        if (!c) return;
        const { ctx, width, height } = c;
        const total = items.reduce((s, x) => s + x.value, 0);
        if (total === 0) return;

        const barH = 16;
        const barY = 18;
        const barW = width - 32;
        const barX = 16;
        const r = 8;

        // 배경
        ctx.fillStyle = '#1c1f2e';
        this._roundRect(ctx, barX, barY, barW, barH, r);
        ctx.fill();

        // 스택
        let cursor = barX;
        items.forEach((it, i) => {

            ctx.fillStyle = it.color;

            const isFirst = i === 0;
            const isLast = i === items.length - 1;
            ctx.save();

            ctx.clip();
            ctx.fillRect(cursor, barY, w, barH);
            ctx.restore();
            cursor += w;
        });

        // 범례
        const lineY = barY + barH + 24;
        const colW = barW / items.length;
        items.forEach((it, i) => {
            const x = barX + colW * i;
            ctx.fillStyle = it.color;
            this._roundRect(ctx, x, lineY - 8, 9, 9, 2);
            ctx.fill();
            ctx.fillStyle = this.colors.text;
            ctx.font = '12px Noto Sans KR, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(it.label, x + 14, lineY - 4);
            ctx.fillStyle = '#f4f5fb';
            ctx.font = 'bold 12px Inter, sans-serif';
            ctx.fillText(`${it.value}  (${it.pct}%)`, x + 14, lineY + 12);
        });
    },

    /**
     * 가로 막대 (Top N — 매체/키워드)
     */
    horizontalBarChart(canvasId, { items, color = '#34d399' }) {
        const c = this.initCanvas(canvasId);
        if (!c) return;
        const { ctx, width, height } = c;
        const padTop = 8, padBottom = 8, padRight = 36, labelW = 180;
        const max = Math.max(...items.map(x => x.value), 1);
        const rowH = (height - padTop - padBottom) / items.length;

        items.forEach((it, i) => {
            const y = padTop + i * rowH + rowH / 2;
            // 라벨
            ctx.fillStyle = this.colors.text;
            ctx.font = '12px Noto Sans KR, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const label = it.label.length > 18 ? it.label.slice(0, 18) + '…' : it.label;
            ctx.fillText(label, 8, y);

            // 막대
            const barX = labelW;
            const barMax = width - labelW - padRight;
            const barW = (it.value / max) * barMax;
            const barH = Math.max(8, rowH * 0.5);
            const grad = ctx.createLinearGradient(barX, y, barX + barW, y);
            grad.addColorStop(0, color + 'aa');
            grad.addColorStop(1, color);
            ctx.fillStyle = grad;
            this._roundRect(ctx, barX, y - barH / 2, barW, barH, barH / 2);
            ctx.fill();

            // 값
            ctx.fillStyle = '#f4f5fb';
            ctx.font = 'bold 12px Inter, sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(String(it.value), barX + barW + 8, y);
        });
    },

    /**
     * 라운드 사각형 헬퍼
     */
    _roundRect(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.lineTo(x + w - rr, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
        ctx.lineTo(x + w, y + h - rr);
        ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
        ctx.lineTo(x + rr, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
        ctx.lineTo(x, y + rr);
        ctx.quadraticCurveTo(x, y, x + rr, y);
        ctx.closePath();
    },

    _roundRectTop(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.lineTo(x + w - rr, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
        ctx.lineTo(x + w, y + h);
        ctx.lineTo(x, y + h);
        ctx.lineTo(x, y + rr);
        ctx.quadraticCurveTo(x, y, x + rr, y);
        ctx.closePath();
    }
};

    /**
     * 카테고리 또는 검색어로 필터링
     */
    filter(category, query) {
        const q = (query || '').trim().toLowerCase();
        return this.clippings.filter(c => {
            const catOk = !category || category === 'all' || c.category === category;
            if (!catOk) return false;
            if (!q) return true;
            return (c.title + ' ' + c.summary + ' ' + c.tags.join(' ')).toLowerCase().includes(q);
        });
    },

    /**
     * 일별 클리핑 추이 (최근 14일)
     */
    getDailyTrend() {
        const dayMap = {};
        this.clippings.forEach(c => {
            const day = c.date.slice(0, 10); // YYYY-MM-DD
            dayMap[day] = (dayMap[day] || 0) + 1;
        });
        const labels = [];
        const counts = [];
        // KST 기준 4/27을 today로 고정 (스크린샷의 수집 시점)
        const todayY = 2026, todayM = 3 /* 0-indexed: April */, todayD = 27;
        for (let i = 13; i >= 0; i--) {
            const d = new Date(todayY, todayM, todayD - i);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            const key = `${yyyy}-${mm}-${dd}`;
            labels.push(`${d.getMonth() + 1}/${d.getDate()}`);
            counts.push(dayMap[key] || 0);
        }
        return { labels, counts };
    },

    /**
     * 채널별 합계 (도넛용)
     */
    getChannelMix() {
        const counts = {};
        this.clippings.forEach(c => {
            counts[c.channel] = (counts[c.channel] || 0) + 1;
        });
        return this.channels.map(ch => ({
            label: ch.label,
            value: counts[ch.key] || 0,
            color: ch.color
        }));
    },

    /**
     * 카테고리별 합계 (도넛용, 0건은 제외)
     */
    getCategoryMix() {
        const counts = {};
        this.clippings.forEach(c => {
            counts[c.category] = (counts[c.category] || 0) + 1;
        });
        return this.categories
            .filter(cat => cat.key !== 'all' && (counts[cat.key] || 0) > 0)
            .map(cat => ({
                key: cat.key,
                label: cat.key === 'press' ? '보도/IR' : cat.label,
                value: counts[cat.key],
                color: this.categoryColors[cat.key] || '#6b7280'
            }));
    },

    /**
     * 감성 비율
     */
    getSentimentMix() {
        const counts = { positive: 0, neutral: 0, negative: 0 };
        this.clippings.forEach(c => { counts[c.sentiment]++; });
        const total = this.clippings.length;
        return [
            { key: 'positive', label: '긍정', value: counts.positive, color: this.sentimentColors.positive, pct: Math.round(counts.positive / total * 100) },
            { key: 'neutral',  label: '중립', value: counts.neutral,  color: this.sentimentColors.neutral,  pct: Math.round(counts.neutral  / total * 100) },
            { key: 'negative', label: '부정', value: counts.negative, color: this.sentimentColors.negative, pct: Math.round(counts.negative / total * 100) }
        ];
    },

    /**
     * 매체 Top 10
     */
    getMediaTop(limit = 10) {
        const counts = {};
        this.clippings.forEach(c => {
            counts[c.media] = (counts[c.media] || 0) + 1;
        });
        return Object.entries(counts)
            .map(([label, value]) => ({ label, value }))
            .sort((a, b) => b.value - a.value)
            .slice(0, limit);
    },

    /**
     * 키워드 Top 10
     */
    getKeywordTop(limit = 10) {
        // 검색어/제품명/카테고리 라벨은 키워드 통계에서 제외 (콘텐츠 토픽 위주로)
        const exclude = new Set(['샥즈', 'OpenRun', 'OpenSwim', '커뮤니티']);
        const counts = {};
        this.clippings.forEach(c => {
            (c.tags || []).forEach(tag => {
                if (exclude.has(tag)) return;
                counts[tag] = (counts[tag] || 0) + 1;
            });
        });
        return Object.entries(counts)
            .map(([label, value]) => ({ label, value }))
            .sort((a, b) => b.value - a.value)
            .slice(0, limit);
    },

    /**
     * 매체 수 (distinct media)
     */
    getMediaCount() {
        return new Set(this.clippings.map(c => c.media)).size;
    }
};

    <script id="app-script">/**
 * SHOKZ Korea Clipping Magazine - Application
 */
const MagazineApp = {
    state: {
        category: 'all',
        query: ''
    },

    refs: {},

    /**
     * 초기 부트스트랩
     */
    init() {
        this.refs = {
            kpiTotal: document.getElementById('kpiTotal'),
            kpiMedia: document.getElementById('kpiMedia'),
            kpiPassed: document.getElementById('kpiPassed'),
            kpiNoise: document.getElementById('kpiNoise'),
            kpiTime: document.getElementById('kpiTime'),
            tabs: document.getElementById('tabs'),
            filterStrip: document.getElementById('filterStrip'),
            searchInput: document.getElementById('searchInput'),
            refreshBtn: document.getElementById('refreshBtn'),
            clippingList: document.getElementById('clippingList'),
            clippingCount: document.getElementById('clippingCount'),
            clippingSub: document.getElementById('clippingSub')
        };

        this.renderKPI();
        this.renderFilterStrip();
        this.renderTabs();
        this.renderCharts();
        this.renderClippings();

        this.refs.searchInput.addEventListener('input', (e) => {
            this.state.query = e.target.value;
            this.renderClippings();
        });

        this.refs.refreshBtn.addEventListener('click', () => this.refresh());

        window.addEventListener('resize', this.debounce(() => this.renderCharts(), 200));
    },

    /**
     * 새로고침: 회전 애니메이션 + 차트 재렌더
     */
    refresh() {
        this.refs.refreshBtn.classList.add('spin');
        setTimeout(() => {
            this.refs.refreshBtn.classList.remove('spin');
            this.renderCharts();
            this.renderClippings();
        }, 400);
    },

    debounce(fn, ms) {
        let t;
        return (...args) => {
            clearTimeout(t);
            t = setTimeout(() => fn.apply(this, args), ms);
        };
    },

    /**
     * KPI 렌더
     */
    renderKPI() {
        const m = MagazineData.meta;
        this.refs.kpiTotal.textContent = m.totalClippings;
        this.refs.kpiMedia.textContent = MagazineData.getMediaCount();
        this.refs.kpiPassed.textContent = m.filterPassed;
        this.refs.kpiNoise.textContent = m.noiseFiltered;
        const d = new Date(m.collectedAt);
        const ampm = d.getHours() < 12 ? '오전' : '오후';
        const hh = d.getHours() % 12 || 12;
        const fmt = `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}. ${ampm} ${hh}:${String(d.getMinutes()).padStart(2, '0')}:${String(d.getSeconds()).padStart(2, '0')}`;
        this.refs.kpiTime.textContent = fmt;
    },

    /**
     * 카테고리 탭 렌더
     */
    renderTabs() {
        this.refs.tabs.innerHTML = '';
        MagazineData.categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'tab' + (cat.key === this.state.category ? ' active' : '');
            btn.textContent = cat.label;
            btn.dataset.key = cat.key;
            btn.addEventListener('click', () => {
                this.state.category = cat.key;
                this.renderTabs();
                this.renderClippings();
            });
            this.refs.tabs.appendChild(btn);
        });
    },

    /**
     * 필터 스트립 렌더
     */
    renderFilterStrip() {
        const m = MagazineData.meta;
        const channelStr = MagazineData.channels
            .map(ch => `${ch.key}:${ch.collected}/${ch.quota}`)
            .join(', ');
        this.refs.filterStrip.innerHTML = `
            <div><span class="fs-key">검색어:</span><span class="fs-val brand">${this.escape(m.searchKeyword)}</span></div>
            <span class="fs-divider">·</span>
            <div><span class="fs-key">채널:</span><span class="fs-val">${this.escape(channelStr)}</span></div>
            <span class="fs-divider">·</span>
            <div><span class="fs-on">정확도 필터 ${m.accuracyFilter ? 'ON' : 'OFF'}</span></div>
        `;
    },

    /**
     * HTML 이스케이프
     */
    escape(s) {
        return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    },

    /**
     * 모든 차트 렌더
     */
    renderCharts() {
        // 일별 추이
        const trend = MagazineData.getDailyTrend();
        ChartEngine.dailyBarChart('dailyChart', {
            labels: trend.labels,
            counts: trend.counts,
            color: ChartEngine.colors.blue
        });

        // 채널 믹스
        ChartEngine.donutWithCenter('channelChart', {
            items: MagazineData.getChannelMix(),
            centerLabel: '건'
        });

        // 카테고리 믹스
        ChartEngine.donutWithCenter('categoryChart', {
            items: MagazineData.getCategoryMix(),
            centerLabel: '건'
        });

        // 감성
        ChartEngine.stackedSentimentBar('sentimentChart', {
            items: MagazineData.getSentimentMix()
        });

        // 매체 Top 10
        ChartEngine.horizontalBarChart('mediaChart', {
            items: MagazineData.getMediaTop(10),
            color: ChartEngine.colors.green
        });

        // 키워드 Top 10
        ChartEngine.horizontalBarChart('keywordChart', {
            items: MagazineData.getKeywordTop(10),
            color: ChartEngine.colors.purple
        });
    },

    /**
     * 클리핑 카드 렌더
     */
    renderClippings() {
        const list = MagazineData.filter(this.state.category, this.state.query)
            .sort((a, b) => b.date.localeCompare(a.date));

        this.refs.clippingCount.textContent = list.length;

        const cat = MagazineData.categories.find(c => c.key === this.state.category);
        const subParts = [];
        subParts.push(`카테고리: ${cat ? cat.label : '전체'}`);
        if (this.state.query) subParts.push(`검색: "${this.state.query}"`);
        this.refs.clippingSub.textContent = subParts.join(' · ');

        if (list.length === 0) {
            this.refs.clippingList.innerHTML = '<div class="empty-state">조건에 맞는 클리핑이 없습니다.</div>';
            return;
        }

        const sentimentLabel = { positive: '긍정', neutral: '중립', negative: '부정' };
        const channelLabel = {
            news: 'NEWS', blog: 'BLOG', cafearticle: 'CAFE'
        };

        this.refs.clippingList.innerHTML = list.map(c => `
            <article class="clipping">
                <div>
                    <div class="clipping-meta">
                        <span class="clipping-channel ch-${c.channel}">${channelLabel[c.channel] || c.channel}</span>
                        <span>${this.escape(c.media)}</span>
                        <span class="dot">·</span>
                        <span>${this.formatDate(c.date)}</span>
                    </div>
                    <h4 class="clipping-title"><a href="${this.escape(c.url)}" target="_blank" rel="noopener">${this.escape(c.title)}</a></h4>
                    <p class="clipping-summary">${this.escape(c.summary)}</p>
                    <div class="clipping-tags">
                        ${(c.tags || []).map(t => `<span class="tag">#${this.escape(t)}</span>`).join('')}
                    </div>
                </div>
                <span class="sentiment-pill s-${c.sentiment}">${sentimentLabel[c.sentiment]}</span>
            </article>
        `).join('');
    },

    /**
     * 날짜 포맷 (YYYY-MM-DD HH:mm → MM.DD HH:mm)
     */
    formatDate(s) {
        const m = s.match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})/);
        if (!m) return s;
        return `${m[2]}.${m[3]} ${m[4]}:${m[5]}`;
    }
};

// 부트스트랩
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => MagazineApp.init());
} else {
    MagazineApp.init();
}
</script>
</body>
</html>
