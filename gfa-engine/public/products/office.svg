<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5B6470"/>
      <stop offset="45%" stop-color="#3A4150"/>
      <stop offset="100%" stop-color="#1A1F2A"/>
    </linearGradient>
    <radialGradient id="lamp" cx="22%" cy="28%" r="30%">
      <stop offset="0%" stop-color="rgba(255,236,200,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,236,200,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#lamp)"/>
  <!-- desk plane -->
  <rect x="0" y="820" width="1200" height="380" fill="rgba(0,0,0,0.45)"/>
  <!-- monitor -->
  <g fill="rgba(0,0,0,0.78)" stroke="rgba(255,255,255,0.18)" stroke-width="3">
    <rect x="700" y="540" width="380" height="240" rx="10"/>
    <rect x="870" y="780" width="40" height="40"/>
    <rect x="780" y="820" width="220" height="10" rx="3"/>
  </g>
  <!-- monitor screen glow -->
  <rect x="712" y="552" width="356" height="216" fill="rgba(0,153,229,0.35)"/>
  <!-- coffee cup -->
  <g fill="rgba(255,255,255,0.75)">
    <rect x="200" y="780" width="80" height="80" rx="6"/>
    <rect x="280" y="800" width="20" height="40" rx="6"/>
  </g>
  <!-- notes -->
  <g fill="rgba(255,255,255,0.45)">
    <rect x="360" y="820" width="180" height="30"/>
    <rect x="360" y="860" width="140" height="18"/>
  </g>
</svg>
