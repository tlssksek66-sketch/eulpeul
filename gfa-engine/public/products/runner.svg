      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="40%" stop-color="#FF8E1C"/>
      <stop offset="100%" stop-color="#003B73"/>
    </linearGradient>
    <radialGradient id="sun" cx="80%" cy="22%" r="35%">
      <stop offset="0%" stop-color="#FFFBE6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFBE6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#sun)"/>
  <!-- abstract horizon -->
  <path d="M0 880 Q 300 820 600 870 T 1200 850 L 1200 1200 L 0 1200 Z" fill="rgba(0,0,0,0.32)"/>
