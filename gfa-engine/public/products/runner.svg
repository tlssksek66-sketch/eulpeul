    <circle cx="780" cy="500" r="38"/>
    <path d="M740 555 L 820 540 L 860 600 L 900 700 L 870 720 L 830 660 L 800 720 L 850 800 L 820 820 L 760 760 L 720 820 L 690 800 L 740 700 L 700 640 L 660 660 L 640 640 L 720 580 Z"/>
