name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gfa-engine:
    name: gfa-engine · lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gfa-engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gfa-engine/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Format check (prettier)
        run: npm run format:check

      - name: Unit tests (vitest)
        run: npm test

      - name: Build (vite)
        run: npm run build

      - name: Upload dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gfa-engine-dist-${{ github.sha }}
          path: gfa-engine/dist
          if-no-files-found: error
          retention-days: 14
