name: Daily Magazine Collect

on:
  schedule:
    # 매일 KST 08:00 = UTC 23:00 (전날)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      keywords:
        description: '쉼표로 구분된 검색 키워드 (기본: SHOKZ,샥즈,샥즈코리아,SHOKZ KOREA)'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: magazine-collect
  cancel-in-progress: false

jobs:
  collect:
    name: Collect & commit clippings
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run SHOKZ collector
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          COLLECT_KEYWORDS: ${{ github.event.inputs.keywords }}
        run: node scripts/collect.mjs

      - name: Run Commerce collector
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node scripts/collect-commerce.mjs

      - name: Run Reports scraper
        run: node scripts/collect-reports.mjs

      - name: Index recent PDFs (heuristic)
        run: node scripts/index-reports.mjs
        continue-on-error: true

      - name: Extract insights via Claude (Phase 1)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/extract-insights.mjs
        continue-on-error: true

      - name: Commit if changed
        run: |
          git config user.name "magazine-bot[bot]"
          git config user.email "magazine-bot@users.noreply.github.com"
          git add assets/data/clippings.json assets/data/commerce.json assets/data/reports.json assets/data/report-index.json assets/data/insights.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          ts=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
          git commit -m "chore(data): 일일 클리핑 수집 ($ts)"
          git push
